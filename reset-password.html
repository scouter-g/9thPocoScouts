<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Reset Your Password</h1>
    <p>You must set a new password before continuing.</p>

    <form id="resetForm" class="login-form">
      <label>New Password</label>
      <input type="password" id="newPassword" required minlength="6" />

      <button type="submit" class="button">Update Password</button>

      <p id="errorMsg" class="error"></p>
    </form>
  </main>

<script>
const form = document.getElementById("resetForm");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.textContent = "";

  const newPassword = document.getElementById("newPassword").value;
  const token = localStorage.getItem("authToken");

  if (!token) {
    errorMsg.textContent = "Not authenticated.";
    return;
  }

  try {
    const res = await fetch("/api/resetPassword", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      credentials: "include",   // ⭐ REQUIRED
      body: JSON.stringify({ newPassword })
    });

    const data = await res.json();   // ⭐ FIX: Parse JSON, not text

    if (!res.ok) {
      errorMsg.textContent = data.error || "Password reset failed";
      return;
    }

    // ⭐ FIX: Save the NEW token returned by backend
    if (data.token) {
      localStorage.setItem("authToken", data.token);
    }

    // ⭐ Success → go to welcome page
    window.location.href = "/welcome.html";

  } catch (err) {
    errorMsg.textContent = "Error resetting password.";
  }
});
</script>

</body>
</html>
