<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Equipment Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Scout Equipment Inventory</h1>
    <p>Please sign in to continue.</p>

    <form id="loginForm" class="login-form">
      <label>Email</label>
      <input type="email" id="email" required />

      <label>Password</label>
      <input type="password" id="password" required />

      <button type="submit" class="button">Login</button>

      <p id="errorMsg" class="error"></p>
    </form>
  </main>

<script>
  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("errorMsg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.textContent = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      console.log("Login response:", data);

      if (!res.ok) {
        errorMsg.textContent = data.error || "Login failed";
        return;
      }

      // ⭐ STORE JWT TOKEN
      localStorage.setItem("authToken", data.token);
      console.log("Saved token:", localStorage.getItem("authToken"));

      // ⭐ If user must reset password
      if (data.mustReset) {
        setTimeout(() => {
          location.assign("/reset-password.html");
        }, 50);
        return;
      }

      // ⭐ Otherwise go to welcome page
      setTimeout(() => {
        location.assign("/welcome.html");
      }, 50);

    } catch (err) {
      errorMsg.textContent = "Error logging in.";
    }
  });
</script>

</body>
</html>
